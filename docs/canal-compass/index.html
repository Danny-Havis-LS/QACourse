<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CanalCompass — Family Trip to Holland</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <style>
    [x-cloak] { display: none !important; }
    .day-rail::-webkit-scrollbar { height: 4px; }
    .day-rail::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 2px; }
    [dir="rtl"] .rtl-flip { transform: scaleX(-1); display: inline-block; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-orange-50 via-white to-sky-50 font-sans text-slate-800">

<div x-data="tripApp()" x-init="init()" x-cloak class="mx-auto max-w-4xl px-4 py-6 sm:py-10">

  <!-- Hero -->
  <header class="mb-8 overflow-hidden rounded-3xl bg-gradient-to-br from-orange-500 to-orange-600 p-6 text-white shadow-lg sm:p-8">
    <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
      <div class="flex flex-wrap items-center gap-2">
        <span class="rounded-full bg-white/20 px-3 py-1 text-xs font-semibold backdrop-blur">🇳🇱 July 7–16, 2026</span>
        <span x-show="daysUntil > 0" class="rounded-full bg-white/20 px-3 py-1 text-xs font-semibold backdrop-blur"
          x-text="daysUntil + ' ' + ui.daysToGo"></span>
        <span x-show="daysUntil === 0" class="rounded-full bg-white/20 px-3 py-1 text-xs font-semibold backdrop-blur" x-text="ui.departureDay"></span>
        <span x-show="daysUntil < 0 && daysUntil > -10" class="rounded-full bg-white/20 px-3 py-1 text-xs font-semibold backdrop-blur" x-text="ui.onTrip"></span>
      </div>
      <!-- Language toggle -->
      <div class="flex rounded-xl bg-white/20 p-0.5 backdrop-blur">
        <button @click="setLang('en')" :class="lang === 'en' ? 'bg-white text-orange-600 shadow' : 'text-white'"
          class="rounded-lg px-3 py-1.5 text-xs font-bold transition">EN</button>
        <button @click="setLang('he')" :class="lang === 'he' ? 'bg-white text-orange-600 shadow' : 'text-white'"
          class="rounded-lg px-3 py-1.5 text-xs font-bold transition">עב</button>
      </div>
    </div>
    <p class="text-sm font-medium text-orange-100">CanalCompass</p>
    <h1 class="mt-1 text-3xl font-bold tracking-tight sm:text-4xl" x-text="trip.title"></h1>
    <p class="mt-2 text-orange-100" x-text="trip.family"></p>
  </header>

  <!-- Tabs -->
  <div class="mb-6 flex gap-1 overflow-x-auto rounded-2xl bg-white p-1 shadow-sm ring-1 ring-slate-200">
    <template x-for="tab in tabs" :key="tab.id">
      <button @click="activeTab = tab.id"
        :class="activeTab === tab.id ? 'bg-orange-500 text-white shadow' : 'text-slate-600 hover:bg-orange-50'"
        class="flex-1 shrink-0 rounded-xl px-4 py-2.5 text-sm font-medium transition"
        x-text="tab.label"></button>
    </template>
  </div>

  <!-- Overview -->
  <div x-show="activeTab === 'overview'" class="space-y-4">
    <div class="grid gap-4 sm:grid-cols-2">
      <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
        <h2 class="mb-3 text-xs font-bold uppercase tracking-wider text-orange-500" x-text="ui.accommodation"></h2>
        <template x-for="a in trip.accommodation" :key="a.place">
          <div class="mb-3 last:mb-0">
            <p class="font-semibold text-slate-900" x-text="a.place"></p>
            <p class="text-sm text-slate-500" x-text="a.nights + ' · ' + a.dates"></p>
          </div>
        </template>
      </div>
      <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
        <h2 class="mb-3 text-xs font-bold uppercase tracking-wider text-orange-500" x-text="ui.transport"></h2>
        <ul class="space-y-2">
          <template x-for="t in trip.transport" :key="t">
            <li class="flex gap-2 text-sm text-slate-700">
              <span class="text-orange-400">→</span><span x-text="t"></span>
            </li>
          </template>
        </ul>
      </div>
    </div>
    <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
      <h2 class="mb-2 text-xs font-bold uppercase tracking-wider text-orange-500" x-text="ui.tripFocus"></h2>
      <p class="text-sm leading-relaxed text-slate-700" x-text="trip.interests"></p>
      <div class="mt-3 flex flex-wrap gap-2">
        <template x-for="s in trip.skip" :key="s">
          <span class="rounded-full bg-red-50 px-3 py-1 text-xs font-medium text-red-600 ring-1 ring-red-100" x-text="ui.skip + ': ' + s"></span>
        </template>
      </div>
    </div>
    <div class="rounded-2xl bg-sky-50 p-5 ring-1 ring-sky-100">
      <h2 class="mb-3 text-xs font-bold uppercase tracking-wider text-sky-600" x-text="ui.highlights"></h2>
      <div class="flex flex-wrap gap-2">
        <template x-for="(h, i) in ui.highlightsList" :key="i">
          <span class="rounded-xl bg-white px-3 py-2 text-sm font-medium text-slate-700 ring-1 ring-sky-100" x-text="h"></span>
        </template>
      </div>
    </div>
  </div>

  <!-- Itinerary -->
  <div x-show="activeTab === 'itinerary'">
    <!-- Day selector rail -->
    <div class="day-rail mb-4 flex gap-2 overflow-x-auto pb-2">
      <template x-for="d in days" :key="d.day">
        <button @click="selectDay(d.day)"
          :class="activeDay === d.day
            ? 'bg-orange-500 text-white ring-orange-500'
            : 'bg-white text-slate-600 ring-slate-200 hover:ring-orange-300'"
          class="flex shrink-0 flex-col items-center rounded-2xl px-3 py-2 ring-1 transition sm:px-4">
          <span class="text-[10px] font-semibold uppercase opacity-70" x-text="ui.day + ' ' + d.day"></span>
          <span class="text-xs font-bold" x-text="d.date.split(' ')[1]"></span>
        </button>
      </template>
    </div>

    <!-- Active day detail -->
    <div class="rounded-3xl bg-white shadow-sm ring-1 ring-slate-200">
      <div class="border-b border-slate-100 p-5 sm:p-6">
        <div class="flex flex-wrap items-start justify-between gap-2">
          <div>
            <p class="text-xs font-semibold uppercase tracking-wider text-orange-500"
              x-text="currentDay.weekday + ', ' + currentDay.date"></p>
            <h2 class="mt-1 text-2xl font-bold text-slate-900" x-text="currentDay.title"></h2>
            <p class="mt-1 text-sm text-slate-500" x-text="'📍 ' + currentDay.location"></p>
          </div>
          <div class="flex gap-2">
            <span x-show="currentDay.highlight" class="rounded-full bg-orange-100 px-3 py-1 text-xs font-semibold text-orange-700" x-text="ui.highlight"></span>
            <span x-show="currentDay.relaxed" class="rounded-full bg-green-100 px-3 py-1 text-xs font-semibold text-green-700" x-text="ui.restDay"></span>
            <span x-show="currentDay.destinations && currentDay.destinations.length" class="rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold text-blue-700" x-text="ui.mapsBelow"></span>
            <span x-show="currentDay.kidZone" class="rounded-full bg-yellow-100 px-3 py-1 text-xs font-semibold text-yellow-800" x-text="ui.kidsZone"></span>
          </div>
        </div>
      </div>

      <div class="space-y-1 p-5 sm:p-6">
        <template x-for="(item, i) in currentDay.items" :key="i">
          <div class="flex gap-3 rounded-xl px-3 py-2.5 transition hover:bg-orange-50/50">
            <span class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-orange-100 text-xs font-bold text-orange-600" x-text="i + 1"></span>
            <p class="text-sm leading-relaxed text-slate-700" x-text="item"></p>
          </div>
        </template>
      </div>

      <!-- Kids zone shortcut -->
      <div x-show="currentDay.kidZone" class="border-t border-yellow-100 bg-gradient-to-r from-yellow-50 to-orange-50 px-5 py-4 sm:px-6">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <p class="text-sm font-bold text-yellow-800" x-text="ui.kidsReady"></p>
            <p class="text-xs text-yellow-700" x-text="scavengerProgress.done + '/' + scavengerProgress.total + ' ' + ui.scavengerDone"></p>
          </div>
          <button @click="goToKidsDay(activeDay)"
            class="rounded-xl bg-yellow-400 px-4 py-2 text-sm font-bold text-yellow-900 shadow transition hover:bg-yellow-300"
            x-text="ui.openKids">
          </button>
        </div>
      </div>

      <template x-if="currentDay.options">
        <div class="border-t border-slate-100 p-5 sm:p-6">
          <p class="mb-3 text-xs font-bold uppercase tracking-wider text-slate-400" x-text="ui.chooseAfternoon"></p>
          <div class="grid gap-3 sm:grid-cols-2">
            <template x-for="opt in currentDay.options" :key="opt.name">
              <div class="rounded-2xl bg-sky-50 p-4 ring-1 ring-sky-100">
                <p class="mb-2 text-sm font-semibold text-sky-800" x-text="opt.name"></p>
                <ul class="space-y-1.5">
                  <template x-for="(item, i) in opt.items" :key="i">
                    <li class="flex gap-2 text-xs text-slate-600">
                      <span class="text-sky-400">•</span><span x-text="item"></span>
                    </li>
                  </template>
                </ul>
              </div>
            </template>
          </div>
        </div>
      </template>

      <div x-show="currentDay.footer" class="border-t border-slate-100 px-5 py-4 sm:px-6">
        <p class="text-sm italic text-slate-500" x-text="currentDay.footer"></p>
      </div>

      <!-- Maps & navigation -->
      <div x-show="currentDay.destinations && currentDay.destinations.length" class="border-t border-slate-100 p-5 sm:p-6">
        <p class="mb-1 text-xs font-bold uppercase tracking-wider text-orange-500" x-text="ui.mapsNav"></p>
        <p class="mb-3 text-xs text-slate-400" x-text="ui.mapsHint"></p>
        <div class="space-y-4">
          <template x-for="dest in currentDay.destinations" :key="dest.name">
            <div class="overflow-hidden rounded-2xl ring-1 ring-slate-200">
              <iframe
                :src="osmEmbedUrl(dest)"
                class="h-40 w-full border-0 sm:h-44"
                loading="lazy"
                :title="'Map of ' + dest.name"
              ></iframe>
              <div class="bg-white p-4">
                <p class="font-semibold text-slate-900" x-text="dest.name"></p>
                <p x-show="dest.note" class="mt-0.5 text-xs text-slate-500" x-text="dest.note"></p>
                <div class="mt-3 flex flex-wrap gap-2">
                  <a :href="googleMapsUrl(dest)" target="_blank" rel="noopener"
                    class="inline-flex items-center gap-1.5 rounded-lg bg-blue-50 px-3 py-2 text-xs font-semibold text-blue-700 ring-1 ring-blue-100 transition hover:bg-blue-100"
                    x-text="ui.googleMaps"></a>
                  <a :href="googleNavigateUrl(dest)" target="_blank" rel="noopener"
                    class="inline-flex items-center gap-1.5 rounded-lg bg-green-50 px-3 py-2 text-xs font-semibold text-green-700 ring-1 ring-green-100 transition hover:bg-green-100"
                    x-text="ui.navigate"></a>
                  <a :href="wazeUrl(dest)" target="_blank" rel="noopener"
                    class="inline-flex items-center gap-1.5 rounded-lg bg-sky-50 px-3 py-2 text-xs font-semibold text-sky-700 ring-1 ring-sky-100 transition hover:bg-sky-100"
                    x-text="ui.waze"></a>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Day nav -->
      <div class="flex justify-between border-t border-slate-100 px-5 py-4 sm:px-6">
        <button @click="selectDay(Math.max(1, activeDay - 1))" :disabled="activeDay === 1"
          class="text-sm font-medium text-orange-600 disabled:opacity-30" x-text="ui.prevDay"></button>
        <button @click="selectDay(Math.min(10, activeDay + 1))" :disabled="activeDay === 10"
          class="text-sm font-medium text-orange-600 disabled:opacity-30" x-text="ui.nextDay"></button>
      </div>
    </div>

    <!-- Mini timeline -->
    <div class="mt-4 space-y-2">
      <template x-for="d in days" :key="'mini-' + d.day">
        <button @click="selectDay(d.day)"
          :class="activeDay === d.day ? 'ring-2 ring-orange-400 bg-orange-50' : 'bg-white hover:bg-slate-50'"
          class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-left ring-1 ring-slate-200 transition">
          <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-xs font-bold"
            :class="activeDay === d.day ? 'bg-orange-500 text-white' : 'bg-slate-100 text-slate-600'"
            x-text="d.day"></span>
          <div class="min-w-0 flex-1">
            <p class="truncate text-sm font-medium text-slate-900" x-text="d.title"></p>
            <p class="text-xs text-slate-400" x-text="d.weekday + ', ' + d.date"></p>
          </div>
        </button>
      </template>
    </div>
  </div>

  <!-- Kids Zone tab -->
  <div x-show="activeTab === 'kids'" class="space-y-4">
    <!-- Scoreboard -->
    <div class="rounded-2xl bg-gradient-to-br from-yellow-400 to-orange-400 p-5 text-white shadow-lg">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <p class="text-sm font-medium text-yellow-100" x-text="ui.familyScore"></p>
          <p class="text-4xl font-bold" x-text="familyScore + ' ' + ui.pts"></p>
        </div>
        <div class="text-sm text-yellow-100" :class="dir === 'rtl' ? 'text-left' : 'text-right'">
          <p x-text="earnedBadges.length + ' / ' + badges.length + ' ' + ui.badges"></p>
          <p class="text-xs" x-text="ui.scoreHint"></p>
        </div>
      </div>
    </div>

    <!-- Badges -->
    <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
      <h2 class="mb-3 text-xs font-bold uppercase tracking-wider text-yellow-600" x-text="ui.badgeCollection"></h2>
      <div class="grid grid-cols-5 gap-2 sm:grid-cols-10">
        <template x-for="b in badges" :key="b.id">
          <div class="flex flex-col items-center rounded-xl p-2 text-center ring-1"
            :class="hasBadge(b.id) ? 'bg-yellow-50 ring-yellow-200' : 'bg-slate-50 ring-slate-100 opacity-40'">
            <span class="text-2xl" x-text="b.emoji"></span>
            <span class="mt-1 text-[9px] font-medium leading-tight text-slate-600" x-text="b.name"></span>
          </div>
        </template>
      </div>
      <p class="mt-3 text-xs text-slate-400" x-text="ui.badgeHint"></p>
    </div>

    <!-- Day selector -->
    <div class="day-rail flex gap-2 overflow-x-auto pb-2">
      <template x-for="d in days" :key="'kid-' + d.day">
        <button @click="activeDay = d.day"
          :class="activeDay === d.day ? 'bg-yellow-400 text-yellow-900' : 'bg-white text-slate-600'"
          class="shrink-0 rounded-xl px-3 py-2 text-xs font-bold ring-1 ring-slate-200">
          <span x-text="ui.day + ' ' + d.day"></span>
          <span x-show="d.kidZone && hasBadge(d.kidZone.badge.id)" class="ml-1">✅</span>
        </button>
      </template>
    </div>

    <!-- Day kids content -->
    <div x-show="currentDay.kidZone" class="space-y-4">
      <!-- Mission -->
      <div class="rounded-2xl bg-gradient-to-r from-purple-500 to-pink-500 p-5 text-white shadow-md">
        <p class="text-xs font-bold uppercase tracking-wider text-purple-200" x-text="ui.todayMission"></p>
        <p class="mt-2 text-lg font-bold leading-snug" x-text="currentDay.kidZone.mission"></p>
      </div>

      <!-- Trivia -->
      <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
        <h3 class="mb-3 text-xs font-bold uppercase tracking-wider text-purple-500" x-text="ui.didYouKnow"></h3>
        <div class="space-y-3">
          <template x-for="(t, i) in currentDay.kidZone.trivia" :key="i">
            <div class="rounded-xl bg-purple-50 p-4 ring-1 ring-purple-100">
              <p class="text-sm font-medium text-slate-800" x-text="t.q"></p>
              <button x-show="!isTriviaRevealed(currentDay.day, i)" @click="revealTrivia(currentDay.day, i)"
                class="mt-2 rounded-lg bg-purple-500 px-3 py-1.5 text-xs font-bold text-white hover:bg-purple-600"
                x-text="ui.tapReveal"></button>
              <p x-show="isTriviaRevealed(currentDay.day, i)" class="mt-2 text-sm text-purple-800" x-text="'✅ ' + t.a"></p>
            </div>
          </template>
        </div>
      </div>

      <!-- Fun links -->
      <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
        <h3 class="mb-3 text-xs font-bold uppercase tracking-wider text-sky-500" x-text="ui.exploreMore"></h3>
        <div class="flex flex-wrap gap-2">
          <template x-for="(link, i) in currentDay.kidZone.links" :key="i">
            <a x-show="link.url !== '#packing-tab'" :href="link.url" target="_blank" rel="noopener"
              class="inline-flex items-center gap-2 rounded-xl bg-sky-50 px-4 py-2.5 text-sm font-semibold text-sky-800 ring-1 ring-sky-100 transition hover:bg-sky-100">
              <span x-text="link.emoji"></span><span x-text="link.label"></span>
            </a>
            <button x-show="link.url === '#packing-tab'" @click="activeTab = 'packing'"
              class="inline-flex items-center gap-2 rounded-xl bg-sky-50 px-4 py-2.5 text-sm font-semibold text-sky-800 ring-1 ring-sky-100 transition hover:bg-sky-100">
              <span x-text="link.emoji"></span><span x-text="link.label"></span>
            </button>
          </template>
        </div>
      </div>

      <!-- Scavenger hunt -->
      <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
        <div class="mb-3 flex items-center justify-between">
          <h3 class="text-xs font-bold uppercase tracking-wider text-green-600" x-text="ui.scavengerHunt"></h3>
          <span class="text-xs font-medium text-green-600" x-text="scavengerProgress.done + '/' + scavengerProgress.total"></span>
        </div>
        <div class="mb-3 h-2 overflow-hidden rounded-full bg-green-100">
          <div class="h-full rounded-full bg-green-500 transition-all"
            :style="'width:' + (scavengerProgress.total ? scavengerProgress.done / scavengerProgress.total * 100 : 0) + '%'"></div>
        </div>
        <div class="space-y-1">
          <template x-for="(item, i) in currentDay.kidZone.scavenger" :key="i">
            <label class="flex cursor-pointer items-center gap-3 rounded-xl px-3 py-3 transition hover:bg-green-50">
              <input type="checkbox" :checked="isScavengerDone(currentDay.day, i)" @change="toggleScavenger(currentDay.day, i)"
                class="h-5 w-5 rounded border-green-300 text-green-500 focus:ring-green-400" />
              <span :class="isScavengerDone(currentDay.day, i) ? 'text-slate-400 line-through' : 'text-slate-800'" class="text-sm" x-text="item"></span>
            </label>
          </template>
        </div>
        <div x-show="currentDay.kidZone.badge && hasBadge(currentDay.kidZone.badge.id)"
          class="mt-4 flex items-center gap-2 rounded-xl bg-yellow-100 px-4 py-3 ring-1 ring-yellow-200">
          <span class="text-2xl" x-text="currentDay.kidZone.badge.emoji"></span>
          <p class="text-sm font-bold text-yellow-800" x-text="ui.badgeEarned + ': ' + currentDay.kidZone.badge.name + '! 🎉'"></p>
        </div>
      </div>

      <!-- Teen tip -->
      <div x-show="currentDay.kidZone.teenTip" class="rounded-2xl bg-slate-800 p-5 text-white">
        <p class="text-xs font-bold uppercase tracking-wider text-slate-400" x-text="ui.teenTip"></p>
        <p class="mt-2 text-sm leading-relaxed" x-text="currentDay.kidZone.teenTip"></p>
      </div>
    </div>
  </div>

  <!-- Packing -->
  <div x-show="activeTab === 'packing'" class="space-y-4">

    <!-- Weather -->
    <div class="rounded-2xl bg-gradient-to-br from-sky-50 to-blue-50 p-5 shadow-sm ring-1 ring-sky-100 sm:p-6">
      <h2 class="text-lg font-bold text-slate-900" x-text="ui.weatherTitle"></h2>
      <p class="mt-1 text-sm font-medium text-sky-800" x-text="packingPlan.weather.period"></p>
      <p class="mt-2 text-sm leading-relaxed text-slate-700" x-text="packingPlan.weather.summary"></p>
      <ul class="mt-3 space-y-1.5">
        <template x-for="(tip, i) in packingPlan.weather.details" :key="i">
          <li class="flex gap-2 text-sm text-slate-600">
            <span class="text-sky-500">🌤</span><span x-text="tip"></span>
          </li>
        </template>
      </ul>
    </div>

    <!-- Per person -->
    <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200 sm:p-6">
      <h2 class="mb-3 text-lg font-bold text-slate-900" x-text="ui.packPerPerson"></h2>
      <div class="space-y-3">
        <template x-for="person in packingPlan.people" :key="person.id">
          <details class="rounded-xl ring-1 ring-orange-100 open:bg-orange-50/40">
            <summary class="cursor-pointer list-none px-4 py-3 marker:content-none [&::-webkit-details-marker]:hidden">
              <span class="flex items-center gap-2 text-sm font-semibold text-slate-800">
                <span x-text="person.emoji"></span><span x-text="person.label"></span>
                <span class="ml-auto text-xs font-normal text-slate-400" x-text="person.essentials.length + ' items'"></span>
              </span>
            </summary>
            <ul class="space-y-1 px-4 pb-3">
              <template x-for="(item, i) in person.essentials" :key="i">
                <li class="flex gap-2 text-sm text-slate-600">
                  <span class="text-orange-400">✓</span><span x-text="item"></span>
                </li>
              </template>
            </ul>
          </details>
        </template>
      </div>
    </div>

    <!-- Daily packing (not full itinerary) -->
    <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200 sm:p-6">
      <h2 class="text-lg font-bold text-slate-900" x-text="ui.dailyPacking"></h2>
      <p class="mt-1 mb-4 text-xs text-slate-400" x-text="ui.dailyPackingHint"></p>
      <div class="space-y-3">
        <template x-for="d in dailyPacking" :key="'dp-' + d.day">
          <div class="rounded-xl ring-1 ring-slate-200 p-4">
            <div class="flex flex-wrap items-start justify-between gap-2">
              <div>
                <p class="text-xs font-semibold uppercase tracking-wider text-orange-500" x-text="ui.day + ' ' + d.day + ' · ' + d.weekday + ', ' + d.date"></p>
                <p class="mt-0.5 text-sm font-bold text-slate-900" x-text="d.title"></p>
              </div>
              <button @click="selectDay(d.day)"
                class="shrink-0 text-xs font-semibold text-orange-600 hover:text-orange-500" x-text="ui.viewDay"></button>
            </div>
            <p class="mt-2 text-xs font-bold text-sky-700" x-text="ui.weatherLabel + ': ' + d.weather"></p>
            <p class="mt-2 text-sm text-slate-700"><span class="font-semibold" x-text="ui.wearLabel + ':'"></span> <span x-text="d.wear"></span></p>
            <p class="mt-1 text-xs font-bold uppercase tracking-wide text-slate-500" x-text="ui.packLabel"></p>
            <ul class="mt-1 space-y-1">
              <template x-for="(item, i) in d.pack" :key="i">
                <li class="flex gap-2 text-sm text-slate-600">
                  <span class="text-green-500">•</span><span x-text="item"></span>
                </li>
              </template>
            </ul>
          </div>
        </template>
      </div>
    </div>

    <!-- Shared checklist -->
    <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200 sm:p-6">
    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-lg font-bold text-slate-900" x-text="ui.packingList"></h2>
      <span class="text-sm text-slate-500" x-text="packedCount + ' / ' + packing.length + ' ' + ui.packed"></span>
    </div>
    <div class="mb-4 h-2 overflow-hidden rounded-full bg-slate-100">
      <div class="h-full rounded-full bg-orange-500 transition-all"
        :style="'width:' + (packing.length ? (packedCount / packing.length * 100) : 0) + '%'"></div>
    </div>
    <div class="space-y-1">
      <template x-for="item in packing" :key="item.id">
        <label class="flex cursor-pointer items-center gap-3 rounded-xl px-3 py-3 transition hover:bg-orange-50">
          <input type="checkbox" :checked="isPacked(item.id)" @change="togglePacking(item.id)"
            class="h-4 w-4 rounded border-slate-300 text-orange-500 focus:ring-orange-400" />
          <span :class="isPacked(item.id) ? 'text-slate-400 line-through' : 'text-slate-800'" class="text-sm" x-text="item.label"></span>
        </label>
      </template>
    </div>
    </div>
  </div>

  <!-- Notes -->
  <div x-show="activeTab === 'notes'" class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200 sm:p-6">
    <h2 class="mb-3 text-lg font-bold text-slate-900" x-text="ui.myNotes"></h2>
    <p class="mb-3 text-xs text-slate-400" x-text="ui.notesHint"></p>
    <textarea x-model="notes" @change="saveNotes()" rows="14"
      :placeholder="ui.notesPlaceholder"
      class="w-full resize-none rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm outline-none focus:border-orange-400 focus:bg-white focus:ring-2 focus:ring-orange-100"></textarea>
  </div>

</div>

<script src="kid-data.js?v=8"></script>
<script src="trip-data.js?v=8"></script>
<script src="packing-guide.js?v=8"></script>
<script src="i18n-ui.js?v=8"></script>
<script src="locale-he.js?v=8"></script>
<script src="app.js?v=8"></script>
</body>
</html>
